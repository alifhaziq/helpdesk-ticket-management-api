services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: "helpdesk_ticket_management"
      POSTGRES_USER: "postgres"
      POSTGRES_PASSWORD: "postgres"
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  api:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      - postgres
    environment:
      ASPNETCORE_ENVIRONMENT: "Development"
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=helpdesk_ticket_management;Username=postgres;Password=postgres"
      Jwt__Issuer: "HelpdeskTicketManagement"
      Jwt__Audience: "HelpdeskTicketManagement"
      Jwt__Secret: "replace-this-development-secret-with-at-least-32-characters"
      SeedAdmin__Email: "admin@helpdesk.local"
      SeedAdmin__Password: "Admin123!"
      Database__EnsureCreated: "true"
      AttachmentStorage__RootPath: "/app/attachments"
    ports:
      - "8080:8080"
    volumes:
      - attachment-data:/app/attachments

volumes:
  postgres-data:
  attachment-data:
